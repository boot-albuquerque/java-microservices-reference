apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-payment-service-config
  labels:
    app: payment-service
    release: {{ .Release.Name }}
data:
  SPRING_DATASOURCE_URL: {{ .Values.config.springDatasourceUrl | quote }}
  SPRING_KAFKA_BOOTSTRAP_SERVERS: {{ .Values.config.kafkaBootstrapServers | quote }}
  SPRING_DATA_REDIS_HOST: {{ .Values.config.redisHost | quote }}
  SPRING_DATA_REDIS_PORT: {{ .Values.config.redisPort | quote }}
