include:
  - docker-compose.infra.yml

services:
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: jmr/payment-service:local
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: default
      POSTGRES_USER: ${POSTGRES_USER:-payments}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payments}
      JWT_SECRET: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_SERVICE_NAME: payment-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: service.version=0.1.0,service.namespace=jmr
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      app-net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: jmr/notification-service:local
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: default
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_SERVICE_NAME: notification-service
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: service.version=0.1.0,service.namespace=jmr
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      app-net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
