server:
  address: 0.0.0.0
  port: 8081

spring:
  application:
    name: payment-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://postgres:5432/payments
    username: ${POSTGRES_USER:payments}
    password: ${POSTGRES_PASSWORD:payments}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: kafka:9092
    properties:
      schema.registry.url: http://schema-registry:8081
  data:
    redis:
      host: redis
      port: 6379

app:
  kafka:
    topic: payment.events

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-prod-min-32-bytes-xxxx}

resilience4j:
  circuitbreaker:
    instances:
      kafka-publisher:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      kafka-publisher:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

springdoc:
  packages-to-scan: com.example.payment.presentation.controller
  paths-to-match: /api/**
  show-actuator: false
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: payment-service
